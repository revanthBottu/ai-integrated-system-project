<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mood Machine</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 56px 16px 80px;
      color: #1a202c;
    }

    /* ── Header ─────────────────────────────────────────────────────── */
    header {
      text-align: center;
      margin-bottom: 36px;
    }
    header h1 {
      font-size: 1.9rem;
      font-weight: 800;
      letter-spacing: -0.03em;
    }
    header p {
      margin-top: 5px;
      font-size: 0.87rem;
      color: #718096;
    }

    /* ── Input card ──────────────────────────────────────────────────── */
    .card {
      background: #fff;
      border-radius: 18px;
      padding: 26px 28px;
      box-shadow:
        0 0 0 1px rgba(0,0,0,0.05),
        0 2px 6px rgba(0,0,0,0.06),
        0 8px 24px rgba(0,0,0,0.04);
      width: 100%;
      max-width: 600px;
    }

    textarea {
      display: block;
      width: 100%;
      min-height: 112px;
      padding: 13px 15px;
      font-size: 0.94rem;
      font-family: inherit;
      line-height: 1.6;
      color: #2d3748;
      background: #fafdff;
      border: 1.5px solid #e2e8f0;
      border-radius: 12px;
      resize: vertical;
      outline: none;
      transition: border-color 0.17s, background 0.17s;
    }
    textarea::placeholder { color: #b0bec5; }
    textarea:focus { border-color: #7c8cf8; background: #fff; }

    .input-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 6px;
    }
    .hint     { font-size: 0.72rem; color: #b0bec5; }
    .chars    { font-size: 0.72rem; color: #b0bec5; transition: color 0.15s; }
    .chars.warn { color: #e53e3e; }

    #error {
      display: none;
      margin-top: 10px;
      font-size: 0.82rem;
      color: #c53030;
    }

    button#btn {
      margin-top: 14px;
      width: 100%;
      padding: 12.5px;
      background: #1a202c;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 0.94rem;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.01em;
      transition: background 0.15s, opacity 0.15s, transform 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    button#btn:hover:not(:disabled) { background: #2d3748; }
    button#btn:active:not(:disabled) { transform: scale(0.99); }
    button#btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .spinner {
      width: 15px; height: 15px;
      border: 2px solid rgba(255,255,255,0.25);
      border-top-color: rgba(255,255,255,0.9);
      border-radius: 50%;
      animation: spin 0.65s linear infinite;
      display: none;
    }
    button#btn.loading .spinner { display: inline-block; }

    /* ── Result card ─────────────────────────────────────────────────── */
    #result {
      display: none;
      width: 100%;
      max-width: 600px;
      margin-top: 14px;
    }

    .result-card {
      background: #fff;
      border-radius: 18px;
      padding: 22px 26px 20px;
      border-left: 4px solid #a0aec0;
      box-shadow:
        0 0 0 1px rgba(0,0,0,0.05),
        0 2px 6px rgba(0,0,0,0.06),
        0 8px 24px rgba(0,0,0,0.04);
      animation: fadeUp 0.28s ease;
    }
    .result-card.positive { border-color: #38a169; background: #f0fff6; }
    .result-card.negative { border-color: #e53e3e; background: #fff5f5; }
    .result-card.neutral  { border-color: #718096; background: #f7fafc; }
    .result-card.mixed    { border-color: #805ad5; background: #faf5ff; }

    .mood-row {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .mood-label {
      font-size: 1.35rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .result-card.positive .mood-label { color: #276749; }
    .result-card.negative .mood-label { color: #c53030; }
    .result-card.neutral  .mood-label { color: #4a5568; }
    .result-card.mixed    .mood-label { color: #553c9a; }

    .conf-pct { font-size: 0.92rem; font-weight: 700; color: #718096; }

    .conf-bar {
      height: 5px;
      background: rgba(0,0,0,0.07);
      border-radius: 999px;
      overflow: hidden;
      margin-bottom: 14px;
    }
    .conf-fill {
      height: 100%;
      border-radius: 999px;
      width: 0%;
      transition: width 0.65s cubic-bezier(0.34, 1.4, 0.64, 1);
    }
    .result-card.positive .conf-fill { background: #38a169; }
    .result-card.negative .conf-fill { background: #e53e3e; }
    .result-card.neutral  .conf-fill { background: #718096; }
    .result-card.mixed    .conf-fill { background: #805ad5; }

    .reasoning {
      font-size: 0.86rem;
      color: #4a5568;
      line-height: 1.65;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-top: 13px;
    }
    .tag {
      font-size: 0.69rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      padding: 3px 9px;
      border-radius: 999px;
      background: rgba(0,0,0,0.06);
      color: #4a5568;
    }
    .tag.finetuned { background: #ebf4ff; color: #2b6cb0; }

    /* ── Status bar ──────────────────────────────────────────────────── */
    .statusbar {
      width: 100%;
      max-width: 600px;
      margin-top: 13px;
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 0.75rem;
      color: #a0aec0;
    }
    .dot {
      flex-shrink: 0;
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #a0aec0;
    }
    .dot.busy  { background: #667eea; animation: pulse 1.5s ease-in-out infinite; }
    .dot.ok    { background: #48bb78; }
    .dot.err   { background: #fc8181; }

    /* ── Animations ──────────────────────────────────────────────────── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.25; }
    }
  </style>
</head>
<body>

<header>
  <h1>Mood Machine</h1>
  <p>AI-powered emotional analysis</p>
</header>

<div class="card">
  <textarea
    id="input"
    placeholder="Type a phrase, sentence, or social media post…"
    maxlength="500"
    oninput="onType()"
  ></textarea>
  <div class="input-meta">
    <span class="hint">Ctrl + Enter to analyze</span>
    <span class="chars" id="chars">0 / 500</span>
  </div>
  <div id="error"></div>
  <button id="btn" onclick="run()" disabled>
    <div class="spinner"></div>
    Analyze Mood
  </button>
</div>

<div id="result">
  <div class="result-card" id="rcard">
    <div class="mood-row">
      <span class="mood-label" id="mood"></span>
      <span class="conf-pct" id="pct"></span>
    </div>
    <div class="conf-bar"><div class="conf-fill" id="fill"></div></div>
    <p class="reasoning" id="reasoning"></p>
    <div class="tags" id="tags"></div>
  </div>
</div>

<div class="statusbar">
  <div class="dot busy" id="dot"></div>
  <span id="smsg">Initializing…</span>
</div>

<script>
let ready = false;

/* ── Status polling ───────────────────────────────────────────────── */
function poll() {
  fetch('/status')
    .then(r => r.json())
    .then(applyStatus)
    .catch(() => setTimeout(poll, 3000));
}

function applyStatus(s) {
  const dot = document.getElementById('dot');
  const msg = document.getElementById('smsg');

  if (s.pipeline === 'initializing') {
    dot.className = 'dot busy';
    msg.textContent = 'Initializing…';
    setTimeout(poll, 1500);
    return;
  }

  if (s.pipeline === 'error') {
    dot.className = 'dot err';
    msg.textContent = 'Error: ' + (s.finetune_message || 'unknown');
    return;
  }

  // pipeline === 'ready'
  if (!ready) { ready = true; syncBtn(); }

  if (s.finetune === 'running') {
    dot.className = 'dot busy';
    msg.textContent = s.model + ' · fine-tuning in background…';
    setTimeout(poll, 10000);
  } else if (s.finetune === 'done') {
    dot.className = 'dot ok';
    msg.textContent = s.model + ' · fine-tuned ✓';
  } else if (s.finetune === 'error') {
    dot.className = 'dot err';
    msg.textContent = s.model + ' · ' + (s.finetune_message || 'fine-tuning unavailable');
  } else {
    dot.className = 'dot ok';
    msg.textContent = s.model;
  }
}

/* ── Input ────────────────────────────────────────────────────────── */
function onType() {
  const n = document.getElementById('input').value.length;
  const el = document.getElementById('chars');
  el.textContent = n + ' / 500';
  el.className = 'chars' + (n > 460 ? ' warn' : '');
  clearErr();
  syncBtn();
}

function syncBtn() {
  const text = document.getElementById('input').value.trim();
  const btn  = document.getElementById('btn');
  btn.disabled = !ready || !text || btn.classList.contains('loading');
}

/* ── Analyze ──────────────────────────────────────────────────────── */
async function run() {
  const text = document.getElementById('input').value.trim();
  if (!text || !ready) return;

  setLoading(true);
  clearErr();

  try {
    const res  = await fetch('/analyze', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text }),
    });
    const data = await res.json();
    if (data.error) showErr(data.error);
    else            render(data);
  } catch {
    showErr('Network error — please try again.');
  } finally {
    setLoading(false);
  }
}

function render(d) {
  const card = document.getElementById('rcard');
  card.className = 'result-card ' + d.label;

  document.getElementById('mood').textContent = d.label;
  document.getElementById('pct').textContent  = Math.round(d.confidence * 100) + '%';
  document.getElementById('reasoning').textContent = d.reasoning;

  // Animate confidence bar (reset → set triggers CSS transition)
  const fill = document.getElementById('fill');
  fill.style.width = '0%';
  requestAnimationFrame(() => requestAnimationFrame(() => {
    fill.style.width = Math.round(d.confidence * 100) + '%';
  }));

  // Feature tags
  const tags = document.getElementById('tags');
  tags.innerHTML = '';
  (d.features || []).forEach(f => {
    const t = document.createElement('span');
    t.className = 'tag';
    t.textContent = f;
    tags.appendChild(t);
  });
  if (d.used_finetuned) {
    const t = document.createElement('span');
    t.className = 'tag finetuned';
    t.textContent = 'fine-tuned';
    tags.appendChild(t);
  }

  // Show result with re-triggered animation
  const el = document.getElementById('result');
  el.style.display = 'none';
  void el.offsetWidth;
  el.style.display = 'block';
}

function setLoading(on) {
  const btn = document.getElementById('btn');
  if (on) btn.classList.add('loading');
  else    btn.classList.remove('loading');
  syncBtn();
}

function showErr(msg) {
  const el = document.getElementById('error');
  el.textContent = msg;
  el.style.display = 'block';
}
function clearErr() {
  document.getElementById('error').style.display = 'none';
}

/* Ctrl/Cmd + Enter to submit */
document.getElementById('input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
    const btn = document.getElementById('btn');
    if (!btn.disabled) { e.preventDefault(); run(); }
  }
});

poll();
</script>
</body>
</html>
